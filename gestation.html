#fff;color:var(--text);outline:none}input:focus,select:focus{border-color:rgba(91,141,239,.5);box-shadow:0 0 0 4px rgba(91,141,239,.12)}.radio-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.chip{display:flex;align-items:center;justify-content:center;padding:12px;border-radius:14px;border:1px solid rgba(91,141,239,.16);background:#fff;font-weight:700;cursor:pointer}.chip.active{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border-color:transparent}.tip{display:flex;gap:10px;padding:12px 14px;border-radius:16px;background:rgba(91,141,239,.06);color:#35507f;font-size:13px;margin-top:10px}.summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}.stat{padding:14px;border-radius:16px;background:linear-gradient(180deg,rgba(91,141,239,.06),rgba(127,200,248,.08));border:1px solid rgba(91,141,239,.1)}.stat .k{display:block;color:var(--muted);font-size:12px;margin-bottom:6px}.stat .v{font-size:18px;font-weight:700}.table-wrap{overflow-x:auto}table{width:100%;min-width:760px;border-collapse:collapse}thead th{text-align:left;font-size:13px;color:#496189;padding:14px 12px;background:rgba(91,141,239,.06);border-bottom:1px solid var(--border)}tbody td{padding:14px 12px;border-bottom:1px solid rgba(91,141,239,.08);font-size:14px}.tag{display:inline-flex;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap}.type1{background:rgba(31,157,99,.1);color:var(--success)}.type2{background:rgba(197,139,24,.12);color:var(--warning)}.status-due{background:rgba(91,141,239,.1);color:var(--primary)}.status-upcoming{background:rgba(31,157,99,.1);color:var(--success)}.status-past{background:rgba(209,91,91,.1);color:var(--danger)}.empty{padding:26px 14px;text-align:center;color:var(--muted);font-size:14px}.disclaimer{margin-top:16px;padding:14px 16px;border-radius:16px;background:rgba(209,91,91,.06);border:1px solid rgba(209,91,91,.12);color:#7f3e3e;font-size:13px}.footer-nav{position:st <body>
  <header><div class="container"><div class="topbar"><a class="back" href="index.html">← 返回首页</a></div><section class="hero"><div class="badge">预产期 · 孕周推算</div><h1>预产期孕周计算器</h1><p class="lead">支持按末次月经或预产期计算当前孕周、孕龄与关键节点，适合孕期管理与提醒。</p></section></div></header>
  <main class="container">
    <div class="layout">
      <section class="panel"><div class="panel-hd"><h2>计算方式</h2></div><div class="panel-bd"><div class="radio-row"><div class="chip active" data-mode="lmp">末次月经</div><div class="chip" data-mode="edd">预产期</div></div><div class="tip"><div>📌</div><div><strong>默认规则</strong>按标准 280 天推算，辅助查看孕周和关键日期。</div></div><div class="tip"><div>🩺</div><div><strong>仅供参考</strong>实际孕周请结合B超和产检结果判断。</div></div><div class="form-group" style="margin-top:14px;"><label id="dateLabel" for="dateInput">末次月经</label><input id="dateInput" type="date" /></div></div></section>
      <section class="panel"><div class="panel-hd"><h2>计算结果</h2></div><div class="panel-bd"><div class="summary"><div class="stat"><span class="k">当前孕周</span><span class="v" id="weekText">-</span></div><div class="stat"><span class="k">当前孕龄</span><span class="v" id="dayText">-</span></div><div class="stat"><span class="k">预产期</span><span class="v" id="eddText">-</span></div><div class="stat"><span class="k">关键节点</span><span class="v" id="keyText">-</span></div></div><div class="table-wrap"><table><thead><tr><th>节点</th><th>日期</th><th>说明</th></tr></thead><tbody id="tbody"></tbody></table></div></div></section>
    </div>
  </main>

  <script>
    const modeBtns=[...document.querySelectorAll('.chip')],dateInput=document.getElementById('dateInput'),dateLabel=document.getElementById('dateLabel'),weekText=document.getElementById('weekText'),dayText=document.getElementById('dayText'),eddText=document.getElementById('eddText'),keyText=document.getElementById('keyText'),tbody=document.getElementById('tbody');let mode='lmp';let milestones=[{id:'week-6',name:'孕6周',week:6,desc:'早孕阶段参考'},{id:'week-12',name:'孕12周',week:12,desc:'NT / 建档参考'},{id:'week-16',name:'孕16周',week:16,desc:'早中孕过渡'},{id:'week-20',name:'孕20周',week:20,desc:'大排畸参考'},{id:'week-24',name:'孕24周',week:24,desc:'糖耐筛查参考'},{id:'week-28',name:'孕28周',week:28,desc:'进入孕晚期'},{id:'week-32',name:'孕32周',week:32,desc:'重点监测阶段'},{id:'week-37',name:'孕37周',week:37,desc:'足月开始'},{id:'week-40',name:'孕40周',week:40,desc:'理论分娩日期'}];const fmt=d=>`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;const add=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x};async function loadData(){try{const res=await fetch('./gestation.json',{cache:'no-store'});if(!res.ok) throw new Error('bad response');const data=await res.json();if(Array.isArray(data)&&data.length) milestones=data}catch(e){}}function render(){const v=dateInput.value;if(!v){tbody.innerHTML='<tr><td colspan="3" class="muted">请选择日期后生成结果。</td></tr>';weekText.textContent='-';dayText.textContent='-';eddText.textContent='-';keyText.textContent='-';return}const input=new Date(v+'T00:00:00');let lmp,edd;if(mode==='lmp'){lmp=input;edd=add(lmp,280)}else{edd=input;lmp=add(edd,-280)}const today=new Date();today.setHours(0,0,0,0);const diff=Math.max(0,Math.floor((today-lmp)/86400000));const weeks=Math.floor(diff/7),days=diff%7;weekText.textContent=`${weeks}周${days}天`;dayText.textContent=`${diff}天`;eddText.textContent=fmt(edd);keyText.textContent='见下方';tbody.innerHTML=milestones.map(item=>`<tr><td>${item.name}</td><td>${fmt(add(lmp,item.week*7))}</td><td>${item.desc}</td></tr>`).join('')}function init(){const d=new Date();d.setMonth(d.getMonth()-2);d.setDate(1);dateInput.value=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;render()}modeBtns.forEach(btn=>btn.addEventListener('click',()=>{modeBtns.forEach(b=>b.classList.remove('active'));btn.classList.add('active');mode=btn.dataset.mode;dateLabel.textContent=mode==='lmp'?'末次月经':'预产期';dateInput.value='';render()}));dateInput.addEventListener('change',render);dateInput.addEventListener('input',render);loadData().then(init);
  </script>
