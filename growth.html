  <style>
    :root{--bg:#f6f9ff;--card:rgba(255,255,255,.94);--text:#203047;--muted:#6d7b90;--primary:#5b8def;--primary-2:#7fc8f8;--border:rgba(91,141,239,.12);--shadow:0 12px 32px rgba(54,79,128,.08);--radius:20px}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(127,200,248,.18),transparent 35%),radial-gradient(circle at top right,rgba(91,141,239,.14),transparent 30%),var(--bg);line-height:1.6}a{color:inherit;text-decoration:none}.container{width:min(1120px,calc(100% - 32px));margin:0 auto}header{padding:22px 0 10px}.topbar{display:flex;justify-content:flex-start;align-items:center;gap:12px;margin-bottom:14px}.back{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:14px;border:1px solid var(--border);background:rgba(255,255,255,.85);box-shadow:var(--shadow);color:#466089;font-size:13px;font-weight:700;transition:transform .2s ease,box-shadow .2s ease,background .2s ease}.back:hover{transform:translateY(-1px);box-shadow:0 14px 24px rgba(54,79,128,.08);background:#fff}.hero{background:linear-gradient(135deg,rgba(255,255,255,.92),rgba(255,255,255,.74));border:1px solid var(--border);box-shadow:var(--shadow);border-radius:28px;padding:26px 22px}.badge{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--primary);background:rgba(91,141,239,.08);border:1px solid rgba(91,141,239,.12);padding:7px 12px;border-radius:999px;margin-bottom:14px}h1{margin:0 0 10px;font-size:clamp(26px,5vw,38px);line-height:1.15}.lead{margin:0;color:var(--muted);font-size:15px;max-width:780px}main{padding:16px 0 56px}.layout{display:grid;grid-template-columns:320px minmax(0,1fr);gap:18px;align-items:start}.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.panel-hd{padding:18px 18px 0}.panel-bd{padding:18px}h2{margin:0 0 12px;font-size:18px}label{display:block;margin-bottom:8px;font-size:14px;font-weight:600}.seg{display:grid;grid-template-columns:1fr 1fr;gap:10px}.seg button{border:1px solid rgba(91,141,239,.16);background:#fff;border-radius:14px;padding:12px;font-weight:700;cursor:pointer;color:var(--text)}.seg button.active{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border-color:transparent}.slider-wrap{padding:16px;border-radius:18px;background:linear-gradient(180deg,rgba(91,141,239,.06),rgba(127,200,248,.08));border:1px solid rgba(91,141,239,.1)}input[type="range"]{width:100%}.metric{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:14px}.stat{padding:14px;border-radius:16px;background:#fff;border:1px solid rgba(91,141,239,.1)}.stat .k{display:block;color:var(--muted);font-size:12px;margin-bottom:6px}.stat .v{font-size:18px;font-weight:700}.chart{margin-top:16px;padding:18px;border-radius:18px;background:#fff;border:1px solid rgba(91,141,239,.1)}.chart-head{display:flex;justify-content:space-between;gap:10px;align-items:end;margin-bottom:12px}.chart-head h3{margin:0;font-size:18px}.chart-head p{margin:0;color:var(--muted);font-size:13px}.bars{display:grid;gap:12px}.bar-row{display:grid;grid-template-columns:70px minmax(0,1fr) 70px;gap:10px;align-items:center;font-size:13px}.track{height:12px;border-radius:999px;background:rgba(91,141,239,.08);overflow:hidden;position:relative}.track .fill{height:100%;border-radius:999px;background:linear-gradient(135deg,var(--primary),var(--primary-2));position:relative}.track .fill::after{content:'';position:absolute;top:50%;right:-5px;width:10px;height:10px;border-radius:50%;background:#fff;border:2px solid var(--primary);transform:translateY(-50%)}.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}.legend span{font-size:12px;color:#466089;background:rgba(91,141,239,.06);padding:6px 10px;border-radius:999px}.note{margin-top:14px;padding:14px 16px;border-radius:16px;background:rgba(209,91,91,.06);border:1px solid rgba(209,91,91,.12);color:#7f3e3e;font-size:13px}.footer-nav{position:sticky;bottom:0;z-index:20;padding:10px 0 calc(10px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(246,249,255,.2),rgba(246,249,255,.94) 24%,rgba(246,249,255,.98));backdrop-filter:blur(18px);border-top:1px solid rgba(91,141,239,.10);box-shadow:0 -10px 24px rgba(54,79,128,.05)}.footer-nav-inner{width:min(1120px,calc(100% - 32px));margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.footer-nav a{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 10px;border-radius:18px;color:#466089;font-size:13px;font-weight:700;background:rgba(255,255,255,.86);border:1px solid rgba(91,141,239,.10);box-shadow:0 10px 20px rgba(54,79,128,.05);transition:transform .2s ease,box-shadow .2s ease,background .2s ease}.footer-nav a:hover{transform:translateY(-2px);box-shadow:0 14px 24px rgba(54,79,128,.08);background:#fff}.footer-nav a.active{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border-color:transparent;box-shadow:0 12px 24px rgba(91,141,239,.18)}.nav-ic{font-size:18px;line-height:1}.nav-txt{font-size:12px;line-height:1}.nav-sub{font-size:10px;opacity:.8}.footer-nav a.active .nav-sub{opacity:.92}footer{padding:10px 0 18px;color:var(--muted);font-size:13px;text-align:center}@media (max-width:960px){.layout,.metric{grid-template-columns:1fr}}@media (max-width:640px){.container,.footer-nav-inner{width:min(100% - 20px,1120px)}.hero{padding:22px 16px;border-radius:22px}.panel-bd{padding:16px}.footer-nav-inner{gap:8px}.footer-nav a{padding:10px 6px;border-radius:16px}.nav-ic{font-size:17px}.nav-txt{font-size:11px}}

<body>
  <header>
    <div class="container">
      <div class="topbar"><a class="back" href="index.html">← 返回首页</a></div>
      <section class="hero" aria-labelledby="page-title">
        <div class="badge">儿童生长发育 · 曲线参考</div>
        <h1 id="page-title">儿童生长发育查询</h1>
        <p class="lead">通过更接近生长曲线的方式查看不同年龄与性别的参考范围，帮助家长更直观地了解孩子发育趋势。</p>
      </section>
    </div>
  </header>
  <main class="container">
    <div class="layout">
      <section class="panel"><div class="panel-hd"><h2>条件选择</h2></div><div class="panel-bd"><label>性别</label><div class="seg"><button class="active" data-g="boy">男童</button><button data-g="girl">女童</button></div><div class="slider-wrap" style="margin-top:14px;"><label for="ageRange">年龄</label><input id="ageRange" type="range" min="1" max="6" step="1" value="1" /><div class="muted" style="margin-top:8px;">当前：<strong id="ageLabel">1岁</strong></div></div></div></section>
      <section class="panel"><div class="panel-hd"><h2>标准曲线</h2></div><div class="panel-bd"><div class="chart"><div class="chart-head"><div><h3 id="title">-</h3><p id="desc">-</p></div><div class="muted" id="rangeText">-</div></div><div class="bars" id="bars"></div><div class="legend"><span>蓝色区间为常见参考范围</span><span>中线为中位值</span><span>建议结合身高体重连续观察</span></div></div><div class="metric"><div class="stat"><span class="k">中位身高</span><span class="v" id="hMid">-</span></div><div class="stat"><span class="k">中位体重</span><span class="v" id="wMid">-</span></div><div class="stat"><span class="k">发育提示</span><span class="v" id="note">-</span></div></div><div class="note">说明：本页为常见参考范围与趋势展示，不替代儿童保健门诊评估。若身高体重长期偏离或增长停滞，请咨询儿科医生。</div></div></section>
    </div>
  </main>

  <footer><div class="container">© 2026 母婴育儿小工具站 · 简洁、安全，体验友好</div></footer>
  <script>
    let growthData={boy:[{age:'1岁',heightRange:[71.2,82.0],weightRange:[7.8,12.0],heightMedian:76.6,weightMedian:9.9,tip:'生长速度较快'},{age:'2岁',heightRange:[82.3,95.6],weightRange:[9.7,15.3],heightMedian:88.9,weightMedian:12.5,tip:'注意营养均衡'},{age:'3岁',heightRange:[90.7,104.1],weightRange:[11.4,18.0],heightMedian:97.4,weightMedian:14.7,tip:'活动量增加'},{age:'4岁',heightRange:[98.7,113.7],weightRange:[13.0,21.5],heightMedian:106.2,weightMedian:17.1,tip:'定期体检'},{age:'5岁',heightRange:[105.3,121.0],weightRange:[14.7,24.9],heightMedian:113.2,weightMedian:19.8,tip:'保持睡眠充足'},{age:'6岁',heightRange:[111.8,128.4],weightRange:[16.2,28.9],heightMedian:120.1,weightMedian:22.2,tip:'入学前监测'}],girl:[{age:'1岁',heightRange:[69.2,80.8],weightRange:[7.2,11.3],heightMedian:75.0,weightMedian:9.2,tip:'生长速度较快'},{age:'2岁',heightRange:[81.5,94.6],weightRange:[9.0,14.8],heightMedian:88.0,weightMedian:11.9,tip:'注意营养均衡'},{age:'3岁',heightRange:[90.2,103.3],weightRange:[10.8,17.6],heightMedian:96.8,weightMedian:14.1,tip:'活动量增加'},{age:'4岁',heightRange:[98.5,112.9],weightRange:[12.3,21.0],heightMedian:105.7,weightMedian:16.5,tip:'定期体检'},{age:'5岁',heightRange:[104.9,120.6],weightRange:[13.7,24.1],heightMedian:112.8,weightMedian:19.0,tip:'保持睡眠充足'},{age:'6岁',heightRange:[111.0,127.8],weightRange:[15.4,28.0],heightMedian:119.4,weightMedian:21.6,tip:'入学前监测'}]};const gb=[...document.querySelectorAll('.seg button')],ageRange=document.getElementById('ageRange'),ageLabel=document.getElementById('ageLabel'),title=document.getElementById('title'),desc=document.getElementById('desc'),rangeText=document.getElementById('rangeText'),bars=document.getElementById('bars'),hMid=document.getElementById('hMid'),wMid=document.getElementById('wMid'),note=document.getElementById('note');function cur(){return gb.find(b=>b.classList.contains('active')).dataset.g}function render(){const gender=cur(),r=growthData[gender][+ageRange.value-1];if(!r){return}ageLabel.textContent=r.age;title.textContent=`${gender==='boy'?'男童':'女童'} · ${r.age}`;desc.textContent='蓝色条表示常见范围，中间值用于观察趋势。';rangeText.textContent=`身高 ${r.heightRange[0]}- ${r.heightRange[1]} cm · 体重 ${r.weightRange[0]}- ${r.weightRange[1]} kg`;hMid.textContent=`${r.heightMedian} cm`;wMid.textContent=`${r.weightMedian} kg`;note.textContent=r.tip;bars.innerHTML=[['身高',r.heightRange[0],r.heightRange[1],r.heightMedian],['体重',r.weightRange[0],r.weightRange[1],r.weightMedian]].map(([name,min,max,mid])=>`<div class="bar-row"><div>${name}</div><div class="track"><div class="fill" style="width:${Math.max(10,Math.min(100,(mid-min)/(max-min)*100))}%"></div></div><div>${min}~${max}</div></div>`).join('')}async function init(){try{const res=await fetch('./growth.json',{cache:'no-store'});if(!res.ok) throw new Error('bad response');const data=await res.json();if(data&&data.boy&&data.girl) growthData=data}catch(e){}render()}gb.forEach(btn=>btn.addEventListener('click',()=>{gb.forEach(b=>b.classList.remove('active'));btn.classList.add('active');render()}));ageRange.addEventListener('input',render);init();
  </script>
