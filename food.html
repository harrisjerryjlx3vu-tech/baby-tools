2px;font-size:18px}.stage-list{display:grid;gap:10px}.stage{padding:14px 16px;border-radius:16px;border:1px solid rgba(91,141,239,.1);background:#fff;cursor:pointer;transition:.2s}.stage.active{background:linear-gradient(180deg,rgba(91,141,239,.08),rgba(127,200,248,.12));border-color:rgba(91,141,239,.22)}.stage strong{display:block;margin-bottom:4px}.stage small{color:var(--muted)}.detail{padding:16px;border-radius:18px;background:linear-gradient(180deg,rgba(91,141,239,.06),rgba(127,200,248,.08));border:1px solid rgba(91,141,239,.1)}.detail h3{margin:0 0 8px;font-size:22px}.detail p{margin:0;color:var(--muted)}.chips{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 0}.chip{display:inline-flex;padding:6px 10px;border-radius:999px;background:#fff;border:1px solid rgba(91,141,239,.1);font-size:12px;color:#466089;font-weight:700}.steps{display:grid;gap:12px;margin-top:16px}.step{display:flex;gap:12px;padding:14px 16px;border-radius:16px;background:#fff;border:1px solid rgba(91,141,239,.1)}.num{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;font-weight:800;flex:0 0 auto}.step strong{display:block;margin-bottom:4px}.step span{color:var(--muted);font-size:14px}.footer-nav{position:sticky;bottom:0;z-index:20;padding:10px 0 calc(10px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(246,249,255,.2),rgba(246,249,255,.94) 24%,rgba(246,249,255,.98));backdrop-filter:blur(18px);border-top:1px solid rgba(91,141,239,.10);box-shadow:0 -10px 24px rgba(54,79,128,.05)}.footer-nav-inner{width:min(1120px,calc(100% - 32px));margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:10px}.footer-nav a{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 10px;border-radius:18px;color:#466089;font-size:13px;font-weight:700;background:rgba(255,255,255,.86);border:1px solid rgba(91,141,239,.10);box-shadow:0 10px 20px rgba(54,79,128,.05);transition:transform .2s ease,box-shadow .2s ease,background .2s ease}.footer-nav a:hover{transform:translateY(-2px);box-shadow:0 14px 24px rgba(54,79,128,.08);background:#fff}.footer-nav a.active{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border-color:transparent;box-shadow:0 12px 24px rgba(91,141,239,.18)}.nav-ic{font-size:18px;line-height:1}.nav-txt{font-size:12px;line-height:1}.nav-sub{font-size:10px;opacity:.8}.footer-nav a.active .nav-sub{opacity:.92}footer{padding:10px 0 18px;color:var(--muted);font-size:13px;text-align:center}@media (max-width:960px){.layout{grid-template-columns:1fr}}@media (max-width:640px){.container,.footer-nav-inner{width:min(100% - 20px,1120px)}.hero{padding:22px 16px;border-radius:22px}.panel-bd{padding:16px}.footer-nav-inner{gap:8px}.footer-nav a{padding:10px 6px;border-radius:16px}.nav-ic{font-size:17px}.nav-txt{font-size:11px}}

<body>
  <header><div class="container"><div class="topbar"><a class="back" href="index.html">返回首页</a></div><section class="hero"><div class="badge">辅食添加 · 交互时间表</div><h1>宝宝辅食添加时间表</h1><p class="lead">按月龄查看辅食阶段，支持点击切换，帮助家长判断当前阶段适合添加哪些食物。</p></section></div></header>
  <main class="container">
    <div class="layout">
      <section class="panel"><div class="panel-hd"><h2>月龄阶段</h2></div><div class="panel-bd"><div class="stage-list" id="stageList"></div></div></section>
      <section class="panel"><div class="panel-hd"><h2>辅食建议</h2></div><div class="panel-bd"><div class="detail"><h3 id="title">-</h3><p id="desc">-</p><div class="chips" id="chips"></div></div><div class="steps" id="steps"></div></div></section>

  <script>
    let stages=[{id:'stage-4-6',ageRange:'4-6月龄',title:'开始尝试辅食',description:'以泥糊状、单一食材为主，初期少量尝试，观察是否过敏。',foods:['米粉','菜泥','果泥'],steps:[{title:'先试单一食材',desc:'每次只加一种新食物，连续观察2-3天'},{title:'少量添加',desc:'从1-2勺开始，循序渐进'},{title:'保持母乳/配方奶',desc:'辅食不替代奶量'}]},{id:'stage-6-8',ageRange:'6-8月龄',title:'进入初期咀嚼',description:'可逐步增加种类与质地，从细腻泥糊过渡到稍有颗粒感。',foods:['肉泥','蛋黄','鱼泥'],steps:[{title:'增加铁摄入',desc:'优先补充含铁食物'},{title:'食物细化',desc:'保持软烂，避免呛咳'},{title:'规律进食',desc:'建立固定辅食时间'}]},{id:'stage-8-10',ageRange:'8-10月龄',title:'提升手抓与咀嚼',description:'可加入软烂碎末和小块食物，鼓励宝宝练习抓握。',foods:['碎肉末','软面条','蒸南瓜'],steps:[{title:'练习手抓',desc:'适合手指食物'},{title:'继续防过敏',desc:'新食材仍需观察'},{title:'避免调味',desc:'少盐少糖'}]},{id:'stage-10-12',ageRange:'10-12月龄',title:'接近家庭饮食',description:'食物可更接近家庭餐，但仍需软烂、易咀嚼。',foods:['软饭','蔬菜块','小馒头'],steps:[{title:'逐步同餐',desc:'可与家庭餐同步准备'},{title:'注意安全',desc:'避免坚硬、圆形、黏性食物'},{title:'培养自主进食',desc:'鼓励自己拿勺'}]}];const stageList=document.getElementById('stageList'),title=document.getElementById('title'),desc=document.getElementById('desc'),chips=document.getElementById('chips'),steps=document.getElementById('steps');function render(idx=0){stageList.innerHTML=stages.map((x,i)=>`<div class="stage ${i===idx?'active':''}" data-idx="${i}"><strong>${x.ageRange} · ${x.title}</strong><small>${x.description}</small></div>`).join('');const x=stages[idx];title.textContent=x.ageRange+' · '+x.title;desc.textContent=x.description;chips.innerHTML=x.foods.map(v=>`<span class="chip">${v}</span>`).join('');steps.innerHTML=x.steps.map((s,i)=>`<div class="step"><div class="num">${i+1}</div><div><strong>${s.title}</strong><span>${s.desc}</span></div></div>`).join('');document.querySelectorAll('.stage').forEach(el=>el.addEventListener('click',()=>render(+el.dataset.idx)))}async function init(){try{const res=await fetch('./food.json',{cache:'no-store'});if(!res.ok) throw new Error('bad response');const data=await res.json();if(Array.isArray(data)&&data.length) stages=data}catch(e){ }render()}init();
  </script>
